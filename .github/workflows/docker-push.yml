# Build the image from the repo Dockerfile and push to Docker Hub on every push to `main`.
#
# Repository secrets (Settings → Secrets and variables → Actions):
# DOCKERHUB_USERNAME — Docker Hub username or org
# DOCKERHUB_TOKEN — Access token (recommended), not your account password
#
# Images: ${{ secrets.DOCKERHUB_USERNAME }}/layer-gateway-api-v1:latest,
#         :<version or short-sha>, and :<full git sha>
name: Push to Docker Hub

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional explicit version tag (for example: 0.1.0 or v0.1.0)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: docker-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${GITHUB_SHA::12}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-gateway-api-v1:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-gateway-api-v1:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-gateway-api-v1:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
