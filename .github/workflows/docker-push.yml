# Build and push container image to GHCR on every push to `main`.
#
# Repository secrets:
# HUNTAI_K3S_PAT — PAT with contents:write on taixingbi/huntai-k3s (GitOps image pin)
#
# Images: ghcr.io/<owner>/<repo>:latest, :<ci-version>, and :<full-git-sha>
name: Push to GHCR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional explicit version tag (for example: 0.1.0 or v0.1.0)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${GITHUB_SHA::12}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gitops-gateway-api-${{ github.sha }}
      cancel-in-progress: false
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout huntai-k3s
        uses: actions/checkout@v4
        with:
          repository: taixingbi/huntai-k3s
          token: ${{ secrets.HUNTAI_K3S_PAT }}
          path: huntai-k3s

      - name: Pin gateway-api image tag and digest
        env:
          TAG: ${{ needs.push.outputs.version }}
          DIGEST: ${{ needs.push.outputs.digest }}
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/pin-gitops-image.sh \
            manifests/gateway-api/overlays/dev/kustomization.yaml \
            "" \
            "${IMAGE}" "${TAG}" "${DIGEST}"

      - name: Commit and push
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest change; skip commit"
            exit 0
          fi
          git add manifests/gateway-api/overlays/dev/kustomization.yaml
          SHORT_DIGEST="${{ needs.push.outputs.digest }}"
          SHORT_DIGEST="${SHORT_DIGEST#sha256:}"
          SHORT_DIGEST="${SHORT_DIGEST:0:12}"
          git commit -m "chore(gateway-api-dev): pin image ${{ needs.push.outputs.version }} @ ${SHORT_DIGEST}"
          git push origin HEAD:main
