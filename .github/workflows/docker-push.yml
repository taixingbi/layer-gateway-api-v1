# Build and push container image to GHCR on push to `dev` or `main` (and version tags).
#
# GitOps (huntai-k3s):
#   branch dev  → manifests/gateway-api/overlays/dev  (ai-dev)
#   branch main → manifests/gateway-api/overlays/prod (ai-prod)
#
# Repository secrets:
# HUNTAI_K3S_PAT — PAT with contents:write on taixingbi/huntai-k3s (GitOps image pin)
#
# Images: ghcr.io/<owner>/<repo>:latest, :<ci-version>, and :<full-git-sha>
name: Push to GHCR

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional explicit version tag (for example: 0.1.0 or v0.1.0)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${GITHUB_SHA::12}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build timestamp (UTC)
        id: build_time
        shell: bash
        run: echo "iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ steps.build_time.outputs.iso }}
            BUILD_IMAGE=${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            IMAGE_DIGEST=${{ steps.build.outputs.digest }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:${{ github.sha }}
          # scope isolates cache per repo; ignore-error avoids flaky GHA cache export (image push already succeeded).
          cache-from: type=gha,scope=${{ github.repository }}
          cache-to: type=gha,mode=max,scope=${{ github.repository }},ignore-error=true

  update-gitops-dev:
    needs: push
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gitops-gateway-api-dev-${{ github.sha }}
      cancel-in-progress: false
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      KUSTOMIZATION: manifests/gateway-api/overlays/dev/kustomization.yaml
    steps:
      - name: Checkout huntai-k3s
        uses: actions/checkout@v4
        with:
          repository: taixingbi/huntai-k3s
          token: ${{ secrets.HUNTAI_K3S_PAT }}
          path: huntai-k3s

      - name: Pin gateway-api image (dev)
        env:
          TAG: ${{ needs.push.outputs.version }}
          DIGEST: ${{ needs.push.outputs.digest }}
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/pin-gitops-image.sh \
            "${KUSTOMIZATION}" \
            "${IMAGE}" "${TAG}" "${DIGEST}"

      - name: Commit and push
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          SHORT_DIGEST="${{ needs.push.outputs.digest }}"
          SHORT_DIGEST="${SHORT_DIGEST#sha256:}"
          SHORT_DIGEST="${SHORT_DIGEST:0:12}"
          export COMMIT_MSG="chore(gateway-api-dev): pin image ${{ needs.push.outputs.version }} @ ${SHORT_DIGEST}"
          bash scripts/gitops-commit-push.sh "${KUSTOMIZATION}"

  update-gitops-prod:
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gitops-gateway-api-prod-${{ github.sha }}
      cancel-in-progress: false
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      KUSTOMIZATION: manifests/gateway-api/overlays/prod/kustomization.yaml
    steps:
      - name: Checkout huntai-k3s
        uses: actions/checkout@v4
        with:
          repository: taixingbi/huntai-k3s
          token: ${{ secrets.HUNTAI_K3S_PAT }}
          path: huntai-k3s

      - name: Pin gateway-api image (prod)
        env:
          TAG: ${{ needs.push.outputs.version }}
          DIGEST: ${{ needs.push.outputs.digest }}
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/pin-gitops-image.sh \
            "${KUSTOMIZATION}" \
            "${IMAGE}" "${TAG}" "${DIGEST}"

      - name: Commit and push
        working-directory: huntai-k3s
        shell: bash
        run: |
          set -euo pipefail
          SHORT_DIGEST="${{ needs.push.outputs.digest }}"
          SHORT_DIGEST="${SHORT_DIGEST#sha256:}"
          SHORT_DIGEST="${SHORT_DIGEST:0:12}"
          export COMMIT_MSG="chore(gateway-api-prod): pin image ${{ needs.push.outputs.version }} @ ${SHORT_DIGEST}"
          bash scripts/gitops-commit-push.sh "${KUSTOMIZATION}"
